name: Deploy Dioxus to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Dioxus CLI
        run: cargo install dioxus-cli
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Tailwind
        run: npm install --no-save tailwindcss
      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./assets/input.css -o ./assets/tailwind.css --minify
      - name: Build Dioxus app
        run: dx build --platform web --release
      - name: SPA fallback and no-jekyll
        run: cp dist/index.html dist/404.html && touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
